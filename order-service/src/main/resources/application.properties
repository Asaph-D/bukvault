spring.application.name=order-service
server.port=${ORDER_SERVICE_PORT:8084}

spring.datasource.url=${ORDER_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_order}
spring.datasource.username=${ORDER_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${ORDER_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${ORDER_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

order.catalog.base-url=${CATALOG_SERVICE_URL:http://localhost:8083}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
