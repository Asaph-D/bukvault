spring.application.name=review-service
server.port=${REVIEW_SERVICE_PORT:8086}

spring.datasource.url=${REVIEW_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_reviews}
spring.datasource.username=${REVIEW_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${REVIEW_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${REVIEW_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

review.order.base-url=${ORDER_SERVICE_URL:http://localhost:8084}
review.entitlement.stub=${REVIEW_ENTITLEMENT_STUB:true}
review.entitlement.fail-open=${REVIEW_ENTITLEMENT_FAIL_OPEN:true}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
