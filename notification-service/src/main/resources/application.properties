spring.application.name=notification-service
server.port=${NOTIFICATION_SERVICE_PORT:8088}

spring.datasource.url=${NOTIFICATION_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_notifications}
spring.datasource.username=${NOTIFICATION_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${NOTIFICATION_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${NOTIFICATION_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# SMTP (Gmail : port 587 + STARTTLS)
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

bookvault.mail.from=${EMAIL_FROM:noreply@bukvault.com}
bookvault.mail.enabled=${EMAIL_ENABLED:true}
bookvault.frontend.base-url=${FRONTEND_URL:http://localhost:4200}
bookvault.internal.service-key=${BOOKVAULT_INTERNAL_SERVICE_KEY:bookvault-internal-dev}

# Admin principal (file de validation)
bookvault.admin.primary-user-id=${ADMIN_PRIMARY_USER_ID:10000000-0000-4000-a000-000000000002}
bookvault.admin.primary-email=${ADMIN_PRIMARY_EMAIL:kouokamasaph142@gmail.com}
