spring.application.name=catalog-service
server.port=${CATALOG_SERVICE_PORT:8083}

spring.datasource.url=${CATALOG_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_catalog}
spring.datasource.username=${CATALOG_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${CATALOG_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${CATALOG_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
