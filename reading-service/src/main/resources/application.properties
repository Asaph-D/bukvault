spring.application.name=reading-service
server.port=${READING_SERVICE_PORT:8095}

spring.datasource.url=${READING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_reading}
spring.datasource.username=${READING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${READING_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${READING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Même secret HS256 que auth-service en environnement intégré (256 bits en hex)
spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

reading.order-service.base-url=${ORDER_SERVICE_URL:http://localhost:8084}
reading.entitlement.stub=${READING_ENTITLEMENT_STUB:true}
reading.entitlement.fail-open=${READING_ENTITLEMENT_FAIL_OPEN:true}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
