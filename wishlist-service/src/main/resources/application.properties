spring.application.name=wishlist-service
server.port=${WISHLIST_SERVICE_PORT:8087}

spring.datasource.url=${WISHLIST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_wishlist}
spring.datasource.username=${WISHLIST_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${WISHLIST_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${WISHLIST_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

wishlist.order.base-url=${ORDER_SERVICE_URL:http://localhost:8084}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
