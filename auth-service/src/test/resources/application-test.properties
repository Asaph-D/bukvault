spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

spring.datasource.url=jdbc:h2:mem:auth_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

auth.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
auth.jwt.access-token-minutes=15
auth.jwt.refresh-token-days=7
