spring.application.name=auth-service
server.port=${AUTH_SERVICE_PORT:8081}

spring.datasource.url=${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_auth}
spring.datasource.username=${AUTH_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${AUTH_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${AUTH_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Aligné avec reading-service et les autres resource servers (HS256)
auth.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
auth.jwt.access-token-minutes=${JWT_ACCESS_MINUTES:60}
auth.jwt.refresh-token-days=${JWT_REFRESH_DAYS:7}
auth.jwt.refresh-token-days-remember-me=${JWT_REFRESH_DAYS_REMEMBER_ME:30}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# SMTP à configurer pour forgot-password (futur)
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
