spring.application.name=author-service
server.port=${AUTHOR_SERVICE_PORT:8091}

spring.datasource.url=${AUTHOR_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_authors}
spring.datasource.username=${AUTHOR_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${AUTHOR_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${AUTHOR_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

author.catalog.base-url=${CATALOG_SERVICE_URL:http://localhost:8083}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
