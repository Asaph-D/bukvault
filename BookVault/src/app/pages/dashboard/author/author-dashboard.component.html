<div
  class="dash-shell dash-layout-fixed flex min-h-0 w-full min-w-0 flex-1 flex-col md:min-h-0 md:flex-row author-accent"
>
  <aside
    class="dash-sidebar-panel w-full md:w-72 shrink-0 border-r border-slate-200 dark:border-slate-600/40 px-4 pt-6 pb-4 flex flex-col md:h-full md:min-h-0"
  >
    <div class="flex items-center gap-3 mb-4 px-2 shrink-0">
      <img src="assets/branding/bookvaulticon.png" alt="BookVault" class="h-11 w-11 object-contain rounded-lg" />
      <div>
        <p class="text-[10px] uppercase tracking-widest text-violet-700 dark:text-violet-300/90">Espace auteur</p>
        <p class="font-semibold text-slate-900 dark:text-white font-[family-name:var(--font-display)] text-lg">BookVault</p>
      </div>
    </div>

    <nav class="dash-scroll-thin flex-1 min-h-0 overflow-y-auto space-y-1 text-sm pr-1">
      <a
        routerLink="home"
        routerLinkActive="dash-sidebar-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="dash-sidebar-link"
        ><i class="fas fa-home w-5 text-violet-600 dark:text-violet-400"></i> Vue d'ensemble</a
      >

      <p class="dash-nav-section-title">Compte</p>
      <a routerLink="profile" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-user w-5 text-violet-600 dark:text-violet-400"></i> Profil</a
      >

      <p class="dash-nav-section-title">Création</p>
      <a routerLink="works" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-book w-5 text-violet-600 dark:text-violet-400"></i> Mes œuvres</a
      >
      <a routerLink="new-book" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-plus-circle w-5 text-violet-600 dark:text-violet-400"></i> Nouveau livre</a
      >
      <a routerLink="chapters" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-layer-group w-5 text-violet-600 dark:text-violet-400"></i> Chapitres</a
      >
      <a routerLink="series" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-list-ol w-5 text-violet-600 dark:text-violet-400"></i> Séries</a
      >

      <p class="dash-nav-section-title">Suivi</p>
      <a routerLink="progress" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-chart-line w-5 text-violet-600 dark:text-violet-400"></i> Avancement</a
      >
      <a routerLink="stats" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-chart-area w-5 text-violet-600 dark:text-violet-400"></i> Statistiques</a
      >
      <a routerLink="readers" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-users w-5 text-violet-600 dark:text-violet-400"></i> Lecteurs</a
      >

      <p class="dash-nav-section-title">Engagement</p>
      <a routerLink="comments" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-comments w-5 text-violet-600 dark:text-violet-400"></i> Commentaires</a
      >
      <a routerLink="messages" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-envelope w-5 text-violet-600 dark:text-violet-400"></i> Messages</a
      >
      <a routerLink="challenges" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-trophy w-5 text-violet-600 dark:text-violet-400"></i> Défis & événements</a
      >

      <p class="dash-nav-section-title">Outils</p>
      <a routerLink="resources" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-folder-open w-5 text-violet-600 dark:text-violet-400"></i> Ressources</a
      >
      <a routerLink="templates" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-file-alt w-5 text-violet-600 dark:text-violet-400"></i> Modèles</a
      >
      <a routerLink="settings" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-cog w-5 text-violet-600 dark:text-violet-400"></i> Paramètres</a
      >
    </nav>

    <button
      type="button"
      (click)="logout()"
      class="shrink-0 mt-auto pt-4 dash-sidebar-link border border-slate-200 dark:border-white/10 justify-center text-violet-800 dark:text-violet-200 hover:bg-slate-200/70 dark:hover:bg-white/5"
    >
      <i class="fas fa-sign-out-alt"></i> Déconnexion
    </button>
  </aside>

  <main class="dash-scroll-thin flex-1 min-h-0 overflow-y-auto overflow-x-hidden p-5 md:p-8">
    <router-outlet />
  </main>
</div>
