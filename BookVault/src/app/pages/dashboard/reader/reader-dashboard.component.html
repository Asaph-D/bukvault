<div
  class="dash-shell dash-layout-fixed flex min-h-0 w-full min-w-0 flex-1 flex-col md:min-h-0 md:flex-row reader-accent"
>
  <aside
    class="dash-sidebar-panel w-full md:w-72 shrink-0 border-r border-slate-200 dark:border-slate-600/40 px-4 pt-6 pb-4 flex flex-col md:h-full md:min-h-0"
  >
    <div class="flex items-center gap-3 mb-4 px-2 shrink-0">
      <img src="assets/branding/bookvaulticon.png" alt="BookVault" class="h-11 w-11 object-contain rounded-lg" />
      <div>
        <p class="text-[10px] uppercase tracking-widest text-sky-700 dark:text-sky-300/90">Mon espace</p>
        <p class="font-semibold text-slate-900 dark:text-white text-lg">Lecteur</p>
      </div>
    </div>

    <nav class="dash-scroll-thin flex-1 min-h-0 overflow-y-auto space-y-1 text-sm pr-1">
      <p class="dash-nav-section-title">Parcours</p>
      <a
        routerLink="home"
        routerLinkActive="dash-sidebar-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="dash-sidebar-link"
        ><i class="fas fa-home w-5 text-sky-600 dark:text-sky-400"></i> Vue d'ensemble</a
      >
      <a routerLink="library" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-book w-5 text-sky-600 dark:text-sky-400"></i> Bibliothèque</a
      >
      <a routerLink="discover" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-compass w-5 text-sky-600 dark:text-sky-400"></i> Découvrir</a
      >
      <a routerLink="reading-lists" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-list w-5 text-sky-600 dark:text-sky-400"></i> Listes de lecture</a
      >
      <a routerLink="favorites" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-heart w-5 text-sky-600 dark:text-sky-400"></i> Favoris</a
      >
      <a routerLink="history" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-history w-5 text-sky-600 dark:text-sky-400"></i> Historique</a
      >

      <p class="dash-nav-section-title">Mon compte</p>
      <a routerLink="profile" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-user w-5 text-sky-600 dark:text-sky-400"></i> Profil</a
      >
      <a routerLink="preferences" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-sliders-h w-5 text-sky-600 dark:text-sky-400"></i> Goûts & préférences</a
      >
      <a routerLink="settings" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-cog w-5 text-sky-600 dark:text-sky-400"></i> Paramètres</a
      >
      <a routerLink="subscriptions" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-credit-card w-5 text-sky-600 dark:text-sky-400"></i> Abonnements</a
      >

      <p class="dash-nav-section-title">Communauté</p>
      <a routerLink="community" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-globe w-5 text-sky-600 dark:text-sky-400"></i> Hub communauté</a
      >
      <a routerLink="comments" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-comments w-5 text-sky-600 dark:text-sky-400"></i> Commentaires</a
      >
      <a routerLink="messages" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-envelope w-5 text-sky-600 dark:text-sky-400"></i> Messages</a
      >
      <a routerLink="notifications" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-bell w-5 text-sky-600 dark:text-sky-400"></i> Notifications</a
      >
      <a routerLink="events" routerLinkActive="dash-sidebar-active" class="dash-sidebar-link"
        ><i class="fas fa-calendar w-5 text-sky-600 dark:text-sky-400"></i> Événements</a
      >
    </nav>

    <button
      type="button"
      (click)="logout()"
      class="shrink-0 mt-auto pt-4 dash-sidebar-link border border-slate-200 dark:border-white/10 justify-center text-sky-800 dark:text-sky-200 hover:bg-slate-200/70 dark:hover:bg-white/5"
    >
      <i class="fas fa-sign-out-alt"></i> Déconnexion
    </button>
  </aside>

  <main class="dash-scroll-thin flex-1 min-h-0 overflow-y-auto overflow-x-hidden p-5 md:p-8">
    <router-outlet />
  </main>
</div>
