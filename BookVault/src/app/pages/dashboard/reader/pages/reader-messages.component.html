<app-dashboard-internal-header
  title="Messages"
  eyebrow="Messagerie"
  subtitle="Conversations directes (community-service). Les libellés interlocuteurs viendront du profil utilisateur plus tard."
  [badges]="[
    { label: 'Direct', icon: 'fas fa-envelope' },
    { label: 'JWT', icon: 'fas fa-shield-alt' },
  ]"
>
</app-dashboard-internal-header>

<p *ngIf="error" class="text-amber-700 dark:text-amber-300 text-sm mb-4">{{ error }}</p>

<div class="grid grid-cols-1 lg:grid-cols-5 gap-6 min-h-[420px]">
  <aside class="lg:col-span-2 dash-glass rounded-2xl border border-slate-200/80 dark:border-white/10 p-3 flex flex-col">
    <div class="flex items-center justify-between px-2 py-2 border-b border-slate-200/60 dark:border-white/10 mb-2">
      <span class="text-sm font-semibold text-slate-800 dark:text-zinc-100">Conversations</span>
      <button
        type="button"
        (click)="refreshConversations()"
        class="text-xs text-sky-600 dark:text-sky-400 hover:underline"
      >
        Rafraîchir
      </button>
    </div>
    <p *ngIf="loadingList" class="text-sm text-zinc-500 p-3">Chargement…</p>
    <ul *ngIf="!loadingList" class="space-y-1 overflow-y-auto max-h-[min(60vh,28rem)]">
      <li *ngFor="let c of conversations">
        <button
          type="button"
          (click)="select(c)"
          class="w-full text-left px-3 py-2.5 rounded-xl transition border border-transparent hover:bg-slate-100 dark:hover:bg-white/10"
          [ngClass]="{
            'bg-sky-500/15 border-sky-500/30': selected?.id === c.id,
          }"
        >
          <p class="text-sm font-medium text-slate-900 dark:text-white truncate">{{ peerLabel(c) }}</p>
          <p class="text-xs text-slate-500 dark:text-zinc-500 truncate">{{ c.lastMessagePreview || '—' }}</p>
        </button>
      </li>
      <li *ngIf="!conversations.length" class="text-sm text-zinc-500 px-3 py-4">Aucune conversation.</li>
    </ul>
  </aside>

  <section class="lg:col-span-3 dash-glass rounded-2xl border border-slate-200/80 dark:border-white/10 flex flex-col min-h-[420px]">
    <div class="px-4 py-3 border-b border-slate-200/60 dark:border-white/10">
      <p class="text-sm font-semibold text-slate-900 dark:text-white">
        {{ selected ? peerLabel(selected) : 'Sélectionnez une conversation' }}
      </p>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-3 max-h-[min(55vh,26rem)]">
      <p *ngIf="loadingMessages" class="text-sm text-zinc-500">Chargement des messages…</p>
      <div
        *ngFor="let m of messages"
        class="flex"
        [class.justify-end]="isMine(m)"
      >
        <div
          class="max-w-[85%] rounded-2xl px-3 py-2 text-sm shadow-sm"
          [ngClass]="
            isMine(m)
              ? 'bg-sky-600 text-white'
              : 'bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-zinc-100'
          "
        >
          <p class="whitespace-pre-wrap">{{ m.content }}</p>
          <p class="text-[10px] opacity-70 mt-1">{{ m.createdAt | date : 'short' }}</p>
        </div>
      </div>
      <p *ngIf="!loadingMessages && selected && !messages.length" class="text-sm text-zinc-500">
        Pas encore de messages.
      </p>
    </div>
    <div class="p-4 border-t border-slate-200/60 dark:border-white/10">
      <label class="sr-only" for="dm-input">Message</label>
      <textarea
        id="dm-input"
        [(ngModel)]="draft"
        rows="3"
        [disabled]="!selected || sending"
        placeholder="Écrire un message…"
        class="w-full rounded-xl border border-slate-200 dark:border-white/15 bg-white/90 dark:bg-slate-950/50 text-sm p-3 mb-2 focus:ring-2 focus:ring-sky-500/40 outline-none resize-none"
      ></textarea>
      <button
        type="button"
        (click)="send()"
        [disabled]="!selected || sending || !draft.trim()"
        class="px-4 py-2 rounded-xl text-sm font-semibold bg-sky-600 text-white disabled:opacity-50 hover:bg-sky-500 transition"
      >
        {{ sending ? 'Envoi…' : 'Envoyer' }}
      </button>
    </div>
  </section>
</div>
