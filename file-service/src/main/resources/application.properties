spring.application.name=file-service
server.port=${FILE_SERVICE_PORT:8085}

spring.datasource.url=${FILE_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookvault_files}
spring.datasource.username=${FILE_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${FILE_DATASOURCE_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=${FILE_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=85MB

file.storage.root=${FILE_STORAGE_ROOT:${user.home}/bookvault-files}
file.order.base-url=${ORDER_SERVICE_URL:http://localhost:8084}
file.entitlement.stub=${FILE_ENTITLEMENT_STUB:true}
file.entitlement.fail-open=${FILE_ENTITLEMENT_FAIL_OPEN:false}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
